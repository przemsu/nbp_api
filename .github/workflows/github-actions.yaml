name: Daily Pipeline Run

on:
  schedule:
    # Changed to 18:12 UTC to avoid delays during peak hour loads (00 min)
    - cron: "12 18 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.6"
          cache: 'pip' # Caching dependencies

      - name: Install packages
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python main.py

      - name: Commit and push RAW data and logs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Track changes in data and logs
          git add data/raw/ logs/
          
          # Only commit if there are changes to avoid workflow failure
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily data & logs update [skip ci]"
            git push
          fi

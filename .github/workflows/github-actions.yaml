name: Daily Pipeline Run

on:
  schedule:
    # Changed to 18:12 UTC to avoid delays during peak hour loads (00 min)
    - cron: "12 18 * * 1-5"
  workflow_dispatch:

env:
  TZ: Europe/Warsaw

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for rebase to work

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install packages
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python main.py

      - name: Commit and push RAW data and logs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Stage changes first
          git add data/ logs/
          
          # Only proceed if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            # Stash changes to allow a clean rebase
            git stash
            # Pull latest changes from origin
            git pull --rebase -X theirs origin main
            # Pop changes back and commit
            git stash pop
            git add data/ logs/
            git commit -m "Daily data & logs update [skip ci]"
            git push origin main
          fi

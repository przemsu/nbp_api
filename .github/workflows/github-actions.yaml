name: Daily Pipeline Run

on:
  schedule:
    # Changed to 18:12 UTC to avoid delays during peak hour loads (00 min)
    - cron: "12 18 * * *"
  workflow_dispatch:

env:
  TZ: Europe/Warsaw

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for rebase to work

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install packages
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python main.py

      - name: Commit and push RAW data and logs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Track changes in data and logs
          git add data/raw/ logs/
          
          # Only commit if there are changes to avoid workflow failure
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily data & logs update [skip ci]"
            # Pull latest changes and rebase to avoid 'rejected (fetch first)' error
            # -X theirs favors the current run's changes in case of conflict
            git pull --rebase -X theirs origin main
            git push origin main
          fi
